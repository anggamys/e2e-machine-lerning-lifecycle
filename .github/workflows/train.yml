name: Train Model

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python preprocessing/preprocessing.py

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/anggamys/e2e-machine-lerning-lifecycle.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run . --env-manager=local

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Docker image to GHCR
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/anggamys/e2e-machine-lerning-lifecycle.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -f run_id.txt ]; then
            RUN_ID=$(cat run_id.txt)
            
            # Memastikan nama image formatnya lowercase (syarat utama docker/GHCR)
            IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Download model dari DagsHub
            mlflow artifacts download -r $RUN_ID -a model -d downloaded_model
            
            # Build custom API Docker image
            docker build -t $IMAGE_NAME:latest .
            
            # Push image ke GHCR
            docker push $IMAGE_NAME:latest
          else
            echo "Skip if model not found"
          fi
