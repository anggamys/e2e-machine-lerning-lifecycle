name: Train Model

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python preprocessing/preprocessing.py

      - name: Run MLflow Project
        run: |
          mlflow run .

      - name: Run modelling
        run: |
          python modelling/modelling.py

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker -m mlruns/1/*/artifacts/model -n ${{ github.repository }}:latest || echo "Skip if model not found"
